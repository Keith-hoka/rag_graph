services:
  neo4j:
    image: neo4j:2026.05.0
    container_name: rag-graph-neo4j
    ports:
      - "7474:7474"  # HTTP / Neo4j Browser
      - "7687:7687"  # Bolt（Python driver connection
    environment:
      NEO4J_AUTH: "neo4j/F6FdfpBjLAjy1-9h_WSCQxMKaQGcN_lF-y-5suey39A"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
    volumes:
      - neo4j_data:/data
volumes:
  neo4j_data:
